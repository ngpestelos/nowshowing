name: Refresh schedules

on:
  schedule:
    # Asia/Manila (UTC+8) is 8h ahead of UTC
    - cron: "17 22 * * *"  # 06:17 Manila (off minute 0 to dodge GH cron congestion)
    - cron: "17 5 * * *"   # 13:17 Manila
    - cron: "17 11 * * *"  # 19:17 Manila
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build public/index.html
        run: python3 scripts/fetch_and_build.py

      - name: Commit and push if changed
        run: |
          git config user.name "nowshowing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh schedules $(date -u +%Y-%m-%d)"
          git push
